<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Booking</title>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }
        header {
            background-color: #0073e6;
            color: white;
            padding: 15px;
        }
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px auto;
        }
        .booking-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: 0.3s;
            width: 200px;
        }
        .booking-section:hover {
            background-color: #e6f2ff;
        }
        .form-container {
            display: none;
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 50%;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .booking-section i {
            font-size: 30px;
            margin-bottom: 10px;
        }
        .ticket {
            display: none;
            background: #fff;
            padding: 15px;
            border: 1px dashed #0073e6;
            margin: 20px auto;
            width: 40%;
            border-radius: 5px;
        }
        .btn {
            display: inline-block;
            background-color: #0073e6;
            color: white;
            padding: 10px 20px;
            margin: 10px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>Ticket Booking System</h1>
    </header>

    <div class="container">
        <div class="booking-section" onclick="showForm('movie-form')">
            <i class="fas fa-film"></i>
            <h3>Movie Tickets</h3>
        </div>
        <div class="booking-section" onclick="showForm('train-form')">
            <i class="fas fa-train"></i>
            <h3>Train Tickets</h3>
        </div>
        <div class="booking-section" onclick="showForm('bus-form')">
            <i class="fas fa-bus"></i>
            <h3>Bus Tickets</h3>
        </div>
    </div>

    <div id="movie-form" class="form-container">
        <h2>Book Movie Ticket</h2>
        <label>Movie:</label>
        <select id="movie">
            <option value="oppenheimer">Oppenheimer</option>
            <option value="barbie">Barbie</option>
            <option value="avatar2">Avatar 2</option>
        </select><br><br>
        <label>Seats:</label>
        <input type="number" id="movie-seats" min="1" max="10"><br><br>
        <button onclick="bookTicket('movie')">Book Now</button>
    </div>

    <div id="train-form" class="form-container">
        <h2>Book Train Ticket</h2>
        <label>From:</label>
        <input type="text" id="train-from"><br><br>
        <label>To:</label>
        <input type="text" id="train-to"><br><br>
        <label>Date:</label>
        <input type="date" id="train-date"><br><br>
        <button onclick="bookTicket('train')">Book Now</button>
    </div>

    <div id="bus-form" class="form-container">
        <h2>Book Bus Ticket</h2>
        <label>From:</label>
        <input type="text" id="bus-from"><br><br>
        <label>To:</label>
        <input type="text" id="bus-to"><br><br>
        <label>Date:</label>
        <input type="date" id="bus-date"><br><br>
        <button onclick="bookTicket('bus')">Book Now</button>
    </div>

    <div id="ticket" class="ticket"></div>

    <script>
        function showForm(formId) {
            document.querySelectorAll('.form-container').forEach(form => {
                form.style.display = 'none';
            });
            document.getElementById(formId).style.display = 'block';
        }

        function bookTicket(type) {
            let ticketDetails = "";
            if (type === 'movie') {
                ticketDetails = `Movie: ${document.getElementById('movie').value} <br>
                                Seats: ${document.getElementById('movie-seats').value}`;
            } else if (type === 'train') {
                ticketDetails = `From: ${document.getElementById('train-from').value} <br>
                                To: ${document.getElementById('train-to').value} <br>
                                Date: ${document.getElementById('train-date').value}`;
            } else if (type === 'bus') {
                ticketDetails = `From: ${document.getElementById('bus-from').value} <br>
                                To: ${document.getElementById('bus-to').value} <br>
                                Date: ${document.getElementById('bus-date').value}`;
            }
            document.getElementById('ticket').innerHTML = `<h3>Your Ticket</h3>${ticketDetails}`;
            document.getElementById('ticket').style.display = 'block';
        }
    </script>
    <a href="dashboard.html" class="btn">Dashboard</a>
</body>
</html>
